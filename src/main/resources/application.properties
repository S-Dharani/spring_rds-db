spring.application.name=student_details

spring.datasource.url=${MYSQL_URL:jdbc:mysql://10.0.141.83:3306/db?createDatabaseIfNotExist=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
